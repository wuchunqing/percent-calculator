<!DOCTYPE html>
<html lang="zh-CN"> <!-- 初始语言为中文，会动态切换 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 多语言适配：初始标题为中文，会动态切换 -->
    <title>百分比计算器（多语言版） | 计算涨幅、折扣、占比</title>
    <meta name="description" content="免费在线百分比计算器，支持中/英/西语音操作！快速计算X%的Y、涨幅、折扣，语音播报结果，无广告！">
    <meta name="keywords" content="百分比计算器, 语音计算器, 折扣计算器, 涨幅计算, multilingual calculator, calculadora de porcentajes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        .voice-btn {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
        }
        .voice-btn:hover {
            opacity: 0.9;
        }
        .lang-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background: #f1f5f9;
            color: #334155;
            font-weight: 500;
            margin: 0 4px;
        }
        .lang-btn.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="gradient-bg py-10">
        <div class="max-w-4xl mx-auto px-4 text-center text-white">
            <!-- 多语言适配：语言切换按钮 -->
            <div class="mb-4 flex justify-center">
                <button class="lang-btn active" onclick="switchLanguage('zh')">中文</button>
                <button class="lang-btn" onclick="switchLanguage('en')">En</button>
                <button class="lang-btn" onclick="switchLanguage('es')">Esp</button>
            </div>
            <!-- 多语言文本：标题 -->
            <h1 class="text-4xl font-bold mb-3" id="mainTitle">百分比计算器（多语言版）</h1>
            <!-- 多语言文本：副标题 -->
            <p class="text-lg opacity-90" id="subTitle">支持语音指令计算，自动播报结果 | 算占比、涨幅、折扣</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 py-8 -mt-6">
        <div class="bg-white rounded-xl card-shadow p-6 mb-6">
            <div class="grid md:grid-cols-2 gap-6">
                <!-- 模块1：X% of Y -->
                <div class="p-4 border border-gray-200 rounded-lg bg-gray-50">
                    <h2 class="text-lg font-semibold mb-3 text-gray-800" id="title1">1. 计算 X% 的 Y 值</h2>
                    <div class="flex gap-2 mb-3">
                        <input id="p1" type="number" placeholder="百分比（如10）" class="flex-1 p-3 border border-gray-300 rounded-lg input-focus focus:outline-none" id="placeholder1-1">
                        <span class="flex items-center text-gray-600">%</span>
                    </div>
                    <input id="n1" type="number" placeholder="数值（如200）" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none" id="placeholder1-2">
                    <div class="flex gap-2 mb-3">
                        <button onclick="calc1()" class="flex-1 bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-medium hover:opacity-90 transition" id="btnCalculate">计算</button>
                        <button onclick="startVoiceRecognition('calc1')" class="voice-btn text-white py-3 px-4 rounded-lg font-medium">
                            🎤 <span id="btnVoice">语音</span>
                        </button>
                    </div>
                    <div id="res1" class="mt-3 p-3 bg-gray-100 rounded-lg text-center font-medium text-gray-800"></div>
                </div>

                <!-- 模块2：X is what % of Y -->
                <div class="p-4 border border-gray-200 rounded-lg bg-gray-50">
                    <h2 class="text-lg font-semibold mb-3 text-gray-800" id="title2">2. 计算 X 是 Y 的百分之几</h2>
                    <input id="p2" type="number" placeholder="数值X（如80）" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none" id="placeholder2-1">
                    <input id="n2" type="number" placeholder="数值Y（如100）" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none" id="placeholder2-2">
                    <div class="flex gap-2 mb-3">
                        <button onclick="calc2()" class="flex-1 bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-medium hover:opacity-90 transition" id="btnCalculate2">计算</button>
                        <button onclick="startVoiceRecognition('calc2')" class="voice-btn text-white py-3 px-4 rounded-lg font-medium">
                            🎤 <span id="btnVoice2">语音</span>
                        </button>
                    </div>
                    <div id="res2" class="mt-3 p-3 bg-gray-100 rounded-lg text-center font-medium text-gray-800"></div>
                </div>

                <!-- 模块3：增减百分比 -->
                <div class="p-4 border border-gray-200 rounded-lg bg-gray-50">
                    <h2 class="text-lg font-semibold mb-3 text-gray-800" id="title3">3. 计算百分比增减</h2>
                    <input id="n3a" type="number" placeholder="初始值（如100）" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none" id="placeholder3-1">
                    <input id="n3b" type="number" placeholder="最终值（如120）" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none" id="placeholder3-2">
                    <div class="flex gap-2 mb-3">
                        <button onclick="calc3()" class="flex-1 bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-medium hover:opacity-90 transition" id="btnCalculate3">计算</button>
                        <button onclick="startVoiceRecognition('calc3')" class="voice-btn text-white py-3 px-4 rounded-lg font-medium">
                            🎤 <span id="btnVoice3">语音</span>
                        </button>
                    </div>
                    <div id="res3" class="mt-3 p-3 bg-gray-100 rounded-lg text-center font-medium text-gray-800"></div>
                </div>

                <!-- 模块4：折扣计算 -->
                <div class="p-4 border border-gray-200 rounded-lg bg-gray-50">
                    <h2 class="text-lg font-semibold mb-3 text-gray-800" id="title4">4. 折扣计算器</h2>
                    <input id="price" type="number" placeholder="原价（如100）" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none" id="placeholder4-1">
                    <input id="discount" type="number" placeholder="折扣%（如10）" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none" id="placeholder4-2">
                    <div class="flex gap-2 mb-3">
                        <button onclick="calcDiscount()" class="flex-1 bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-medium hover:opacity-90 transition" id="btnCalculate4">计算</button>
                        <button onclick="startVoiceRecognition('calcDiscount')" class="voice-btn text-white py-3 px-4 rounded-lg font-medium">
                            🎤 <span id="btnVoice4">语音</span>
                        </button>
                    </div>
                    <div id="resDiscount" class="mt-3 p-3 bg-gray-100 rounded-lg text-center font-medium text-gray-800"></div>
                </div>
            </div>
        </div>

        <!-- 多语言文本：页脚 -->
        <footer class="text-center text-gray-500 text-sm py-4" id="footerText">
            <p>© 2025 多语言百分比计算器 | 支持中/英/西语音指令</p>
        </footer>
    </div>

    <script>
        // ========== 多语言适配：核心配置（所有文本按语言分类） ==========
        const langConfig = {
            // 中文
            zh: {
                mainTitle: "百分比计算器（多语言版）",
                subTitle: "支持语音指令计算，自动播报结果 | 算占比、涨幅、折扣",
                title1: "1. 计算 X% 的 Y 值",
                title2: "2. 计算 X 是 Y 的百分之几",
                title3: "3. 计算百分比增减",
                title4: "4. 折扣计算器",
                placeholder1_1: "百分比（如10）",
                placeholder1_2: "数值（如200）",
                placeholder2_1: "数值X（如80）",
                placeholder2_2: "数值Y（如100）",
                placeholder3_1: "初始值（如100）",
                placeholder3_2: "最终值（如120）",
                placeholder4_1: "原价（如100）",
                placeholder4_2: "折扣%（如10）",
                btnCalculate: "计算",
                btnVoice: "语音",
                footerText: "© 2025 多语言百分比计算器 | 支持中/英/西语音指令",
                result1: "结果：{{value}}",
                result2: "结果：{{value}}%",
                result3_up: "上涨：{{value}}%",
                result3_down: "下降：{{value}}%",
                resultDiscount: "节省：{{save}} | 最终价格：{{final}}",
                error_zero: "错误：除数不能为0",
                error_zero_init: "错误：初始值不能为0",
                voice_tip1: "指令识别失败，请说：X%的Y（比如10%的200）",
                voice_tip2: "指令识别失败，请说：X是Y的百分之几（比如80是100的百分之几）",
                voice_tip3: "指令识别失败，请说：X到Y的增减（比如100到120的增减）",
                voice_tip4: "指令识别失败，请说：原价X折扣Y%（比如原价100折扣10%）",
                voice_prompt: "请对着麦克风说出你的计算指令（比如：10%的200、80是100的百分之几）",
                browser_not_support: "你的浏览器不支持语音识别，请使用Chrome/Edge浏览器！"
            },
            // 英文
            en: {
                mainTitle: "Percentage Calculator (Multilingual)",
                subTitle: "Voice commands supported, auto voice result | Calculate percentage, increase, discount",
                title1: "1. Calculate X% of Y",
                title2: "2. What % is X of Y?",
                title3: "3. Calculate Percentage Change",
                title4: "4. Discount Calculator",
                placeholder1_1: "Percentage (e.g. 10)",
                placeholder1_2: "Number (e.g. 200)",
                placeholder2_1: "Value X (e.g. 80)",
                placeholder2_2: "Value Y (e.g. 100)",
                placeholder3_1: "Start Value (e.g. 100)",
                placeholder3_2: "End Value (e.g. 120)",
                placeholder4_1: "Original Price (e.g. 100)",
                placeholder4_2: "Discount % (e.g. 10)",
                btnCalculate: "Calculate",
                btnVoice: "Voice",
                footerText: "© 2025 Multilingual Percentage Calculator | Support CN/EN/ES voice commands",
                result1: "Result: {{value}}",
                result2: "Result: {{value}}%",
                result3_up: "Increase: {{value}}%",
                result3_down: "Decrease: {{value}}%",
                resultDiscount: "Saved: {{save}} | Final Price: {{final}}",
                error_zero: "Error: Cannot divide by zero",
                error_zero_init: "Error: Initial value cannot be zero",
                voice_tip1: "Recognition failed, say: X% of Y (e.g. 10% of 200)",
                voice_tip2: "Recognition failed, say: What % is X of Y (e.g. What % is 80 of 100)",
                voice_tip3: "Recognition failed, say: Change from X to Y (e.g. Change from 100 to 120)",
                voice_tip4: "Recognition failed, say: Original price X discount Y% (e.g. Original price 100 discount 10%)",
                voice_prompt: "Speak your calculation command to the microphone (e.g. 10% of 200, What % is 80 of 100)",
                browser_not_support: "Your browser does not support voice recognition, use Chrome/Edge!"
            },
            // 西班牙语
            es: {
                mainTitle: "Calculadora de Porcentajes (Multilingüe)",
                subTitle: "Comandos de voz soportados, resultado vocal automático | Calcula porcentaje, aumento, descuento",
                title1: "1. Calcular X% de Y",
                title2: "2. ¿Qué % es X de Y?",
                title3: "3. Calcular Cambio de Porcentaje",
                title4: "4. Calculadora de Descuentos",
                placeholder1_1: "Porcentaje (ej. 10)",
                placeholder1_2: "Número (ej. 200)",
                placeholder2_1: "Valor X (ej. 80)",
                placeholder2_2: "Valor Y (ej. 100)",
                placeholder3_1: "Valor Inicial (ej. 100)",
                placeholder3_2: "Valor Final (ej. 120)",
                placeholder4_1: "Precio Original (ej. 100)",
                placeholder4_2: "Descuento % (ej. 10)",
                btnCalculate: "Calcular",
                btnVoice: "Voz",
                footerText: "© 2025 Calculadora de Porcentajes Multilingüe | Soporta comandos de voz CN/EN/ES",
                result1: "Resultado: {{value}}",
                result2: "Resultado: {{value}}%",
                result3_up: "Aumento: {{value}}%",
                result3_down: "Disminución: {{value}}%",
                resultDiscount: "Ahorrado: {{save}} | Precio Final: {{final}}",
                error_zero: "Error: No se puede dividir por cero",
                error_zero_init: "Error: El valor inicial no puede ser cero",
                voice_tip1: "Reconocimiento fallido, di: X% de Y (ej. 10% de 200)",
                voice_tip2: "Reconocimiento fallido, di: ¿Qué % es X de Y (ej. ¿Qué % es 80 de 100)",
                voice_tip3: "Reconocimiento fallido, di: Cambio de X a Y (ej. Cambio de 100 a 120)",
                voice_tip4: "Reconocimiento fallido, di: Precio original X descuento Y% (ej. Precio original 100 descuento 10%)",
                voice_prompt: "Di tu comando de cálculo al micrófono (ej. 10% de 200, ¿Qué % es 80 de 100)",
                browser_not_support: "Tu navegador no soporta reconocimiento de voz, usa Chrome/Edge!"
            }
        };

        // 当前选中的语言（默认中文）
        let currentLang = 'zh';
        // 当前语音识别/播报的语言代码
        let currentVoiceLang = 'zh-CN';

        // ========== 多语言适配：切换语言函数 ==========
        function switchLanguage(lang) {
            // 更新当前语言
            currentLang = lang;
            // 更新语音语言代码
            switch(lang) {
                case 'zh': currentVoiceLang = 'zh-CN'; break;
                case 'en': currentVoiceLang = 'en-US'; break;
                case 'es': currentVoiceLang = 'es-ES'; break;
            }
            // 更新页面所有文本
            updatePageText();
            // 更新语言按钮样式
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.lang-btn[onclick="switchLanguage('${lang}')"]`).classList.add('active');
            // 更新页面lang属性
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : (lang === 'en' ? 'en-US' : 'es-ES');
        }

        // ========== 多语言适配：更新页面文本 ==========
        function updatePageText() {
            const config = langConfig[currentLang];
            // 更新标题/副标题
            document.getElementById('mainTitle').innerText = config.mainTitle;
            document.getElementById('subTitle').innerText = config.subTitle;
            // 更新模块标题
            document.getElementById('title1').innerText = config.title1;
            document.getElementById('title2').innerText = config.title2;
            document.getElementById('title3').innerText = config.title3;
            document.getElementById('title4').innerText = config.title4;
            // 更新输入框占位符
            document.getElementById('p1').placeholder = config.placeholder1_1;
            document.getElementById('n1').placeholder = config.placeholder1_2;
            document.getElementById('p2').placeholder = config.placeholder2_1;
            document.getElementById('n2').placeholder = config.placeholder2_2;
            document.getElementById('n3a').placeholder = config.placeholder3_1;
            document.getElementById('n3b').placeholder = config.placeholder3_2;
            document.getElementById('price').placeholder = config.placeholder4_1;
            document.getElementById('discount').placeholder = config.placeholder4_2;
            // 更新按钮文本
            document.getElementById('btnCalculate').innerText = config.btnCalculate;
            document.getElementById('btnVoice').innerText = config.btnVoice;
            document.getElementById('btnCalculate2').innerText = config.btnCalculate;
            document.getElementById('btnVoice2').innerText = config.btnVoice;
            document.getElementById('btnCalculate3').innerText = config.btnCalculate;
            document.getElementById('btnVoice3').innerText = config.btnVoice;
            document.getElementById('btnCalculate4').innerText = config.btnCalculate;
            document.getElementById('btnVoice4').innerText = config.btnVoice;
            // 更新页脚
            document.getElementById('footerText').innerText = config.footerText;
        }

        // ========== 核心计算功能（适配多语言） ==========
        // 1. X% of Y
        function calc1() {
            let p = parseFloat(document.getElementById('p1').value) || 0;
            let n = parseFloat(document.getElementById('n1').value) || 0;
            let r = (p / 100) * n;
            const config = langConfig[currentLang];
            let resultText = config.result1.replace('{{value}}', r.toFixed(2));
            document.getElementById('res1').innerText = resultText;
            speakResult(resultText); // 语音播报结果
        }

        // 2. X is what % of Y
        function calc2() {
            let x = parseFloat(document.getElementById('p2').value) || 0;
            let y = parseFloat(document.getElementById('n2').value) || 1;
            const config = langConfig[currentLang];
            if (y === 0) {
                let errorText = config.error_zero;
                document.getElementById('res2').innerText = errorText;
                speakResult(errorText);
                return;
            }
            let r = (x / y) * 100;
            let resultText = config.result2.replace('{{value}}', r.toFixed(2));
            document.getElementById('res2').innerText = resultText;
            speakResult(resultText);
        }

        // 3. 百分比增减
        function calc3() {
            let a = parseFloat(document.getElementById('n3a').value) || 0;
            let b = parseFloat(document.getElementById('n3b').value) || 0;
            const config = langConfig[currentLang];
            if (a === 0) {
                let errorText = config.error_zero_init;
                document.getElementById('res3').innerText = errorText;
                speakResult(errorText);
                return;
            }
            let r = ((b - a) / a) * 100;
            let resultKey = r > 0 ? 'result3_up' : 'result3_down';
            let resultText = config[resultKey].replace('{{value}}', Math.abs(r).toFixed(2));
            document.getElementById('res3').innerText = resultText;
            speakResult(resultText);
        }

        // 4. 折扣计算
        function calcDiscount() {
            let price = parseFloat(document.getElementById('price').value) || 0;
            let disc = parseFloat(document.getElementById('discount').value) || 0;
            let saved = (price * disc) / 100;
            let finalPrice = price - saved;
            const config = langConfig[currentLang];
            let resultText = config.resultDiscount
                .replace('{{save}}', saved.toFixed(2))
                .replace('{{final}}', finalPrice.toFixed(2));
            document.getElementById('resDiscount').innerText = resultText;
            speakResult(resultText);
        }

        // ========== 多语言适配：语音播报功能 ==========
        function speakResult(text) {
            // 停止正在播放的语音
            window.speechSynthesis.cancel();
            // 创建语音实例
            let utterance = new SpeechSynthesisUtterance(text);
            // 设置语言（随当前选中语言切换）
            utterance.lang = currentVoiceLang;
            // 设置语速（0.8-1.2 适中）
            utterance.rate = 1;
            // 播放语音
            window.speechSynthesis.speak(utterance);
        }

        // ========== 多语言适配：语音识别功能 ==========
        function startVoiceRecognition(calcType) {
            // 检查浏览器是否支持语音识别
            if (!('webkitSpeechRecognition' in window)) {
                alert(langConfig[currentLang].browser_not_support);
                return;
            }

            // 初始化语音识别（语言随选中语言切换）
            const recognition = new webkitSpeechRecognition();
            recognition.lang = currentVoiceLang; 
            recognition.interimResults = false; 
            recognition.maxAlternatives = 1; 

            // 提示用户说话（多语言提示）
            alert(langConfig[currentLang].voice_prompt);
            recognition.start();

            // 识别成功后的处理（适配不同语言的指令）
            recognition.onresult = function(event) {
                const voiceText = event.results[0][0].transcript; 
                console.log("识别结果：", voiceText);

                const config = langConfig[currentLang];
                // 根据不同计算器类型+语言，解析语音指令
                switch (calcType) {
                    case 'calc1': // X% of Y（适配中/英/西）
                        let reg1;
                        if (currentLang === 'zh') {
                            reg1 = /(\d+(?:\.\d+)?)[%％]的(\d+(?:\.\d+)?)/;
                        } else if (currentLang === 'en') {
                            reg1 = /(\d+(?:\.\d+)?)% of (\d+(?:\.\d+)?)/;
                        } else if (currentLang === 'es') {
                            reg1 = /(\d+(?:\.\d+)?)% de (\d+(?:\.\d+)?)/;
                        }
                        const match1 = voiceText.match(reg1);
                        if (match1) {
                            document.getElementById('p1').value = match1[1];
                            document.getElementById('n1').value = match1[2];
                            calc1();
                        } else {
                            speakResult(config.voice_tip1);
                        }
                        break;

                    case 'calc2': // X是Y的百分之几（适配中/英/西）
                        let reg2;
                        if (currentLang === 'zh') {
                            reg2 = /(\d+(?:\.\d+)?)是(\d+(?:\.\d+)?)的百分之几/;
                        } else if (currentLang === 'en') {
                            reg2 = /What % is (\d+(?:\.\d+)?) of (\d+(?:\.\d+)?)/i;
                        } else if (currentLang === 'es') {
                            reg2 = /¿Qué % es (\d+(?:\.\d+)?) de (\d+(?:\.\d+)?)/i;
                        }
                        const match2 = voiceText.match(reg2);
                        if (match2) {
                            document.getElementById('p2').value = match2[1];
                            document.getElementById('n2').value = match2[2];
                            calc2();
                        } else {
                            speakResult(config.voice_tip2);
                        }
                        break;

                    case 'calc3': // 增减百分比（适配中/英/西）
                        let reg3;
                        if (currentLang === 'zh') {
                            reg3 = /(\d+(?:\.\d+)?)到(\d+(?:\.\d+)?)的增减/;
                        } else if (currentLang === 'en') {
                            reg3 = /Change from (\d+(?:\.\d+)?) to (\d+(?:\.\d+)?)/i;
                        } else if (currentLang === 'es') {
                            reg3 = /Cambio de (\d+(?:\.\d+)?) a (\d+(?:\.\d+)?)/i;
                        }
                        const match3 = voiceText.match(reg3);
                        if (match3) {
                            document.getElementById('n3a').value = match3[1];
                            document.getElementById('n3b').value = match3[2];
                            calc3();
                        } else {
                            speakResult(config.voice_tip3);
                        }
                        break;

                    case 'calcDiscount': // 折扣计算（适配中/英/西）
                        let reg4;
                        if (currentLang === 'zh') {
                            reg4 = /原价(\d+(?:\.\d+)?)折扣(\d+(?:\.\d+)?)%/;
                        } else if (currentLang === 'en') {
                            reg4 = /Original price (\d+(?:\.\d+)?) discount (\d+(?:\.\d+)?)%/i;
                        } else if (currentLang === 'es') {
                            reg4 = /Precio original (\d+(?:\.\d+)?) descuento (\d+(?:\.\d+)?)%/i;
                        }
                        const match4 = voiceText.match(reg4);
                        if (match4) {
                            document.getElementById('price').value = match4[1];
                            document.getElementById('discount').value = match4[2];
                            calcDiscount();
                        } else {
                            speakResult(config.voice_tip4);
                        }
                        break;
                }
            };

            // 识别错误/结束的处理
            recognition.onerror = function(event) {
                alert("语音识别出错：" + event.error);
            };
            recognition.onend = function() {
                recognition.stop();
            };
        }

        // 页面加载时初始化文本
        window.onload = function() {
            updatePageText();
        };
    </script>
</body>
</html>
