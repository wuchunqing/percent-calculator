<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentage Calculator | Free Online Percent Calculator</title>
    <meta name="description" content="Free online percentage calculator. Calculate percentages, percentage increase, decrease, discounts, and more with ease.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="gradient-bg py-10">
        <div class="max-w-4xl mx-auto px-4 text-center text-white">
            <h1 class="text-4xl font-bold mb-3">Percentage Calculator</h1>
            <p class="text-lg opacity-90">Calculate percentages, increases, decreases, and discounts instantly</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 py-8 -mt-6">
        <div class="bg-white rounded-xl card-shadow p-6 mb-6">
            <div class="grid md:grid-cols-2 gap-6">
                <!-- 模块1：X% of Y -->
                <div class="p-4 border border-gray-200 rounded-lg bg-gray-50">
                    <h2 class="text-lg font-semibold mb-3 text-gray-800">What is X% of Y?</h2>
                    <input id="p1" type="number" placeholder="Percentage %" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none">
                    <input id="n1" type="number" placeholder="Number" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none">
                    <button onclick="calc1()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-medium hover:opacity-90 transition">Calculate</button>
                    <div id="res1" class="mt-3 p-3 bg-gray-100 rounded-lg text-center font-medium text-gray-800"></div>
                </div>

                <!-- 模块2：X is what % of Y -->
                <div class="p-4 border border-gray-200 rounded-lg bg-gray-50">
                    <h2 class="text-lg font-semibold mb-3 text-gray-800">X is what % of Y?</h2>
                    <input id="p2" type="number" placeholder="Value X" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none">
                    <input id="n2" type="number" placeholder="Value Y" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none">
                    <button onclick="calc2()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-medium hover:opacity-90 transition">Calculate</button>
                    <div id="res2" class="mt-3 p-3 bg-gray-100 rounded-lg text-center font-medium text-gray-800"></div>
                </div>

                <!-- 模块3：增减百分比 -->
                <div class="p-4 border border-gray-200 rounded-lg bg-gray-50">
                    <h2 class="text-lg font-semibold mb-3 text-gray-800">Percentage Change</h2>
                    <input id="n3a" type="number" placeholder="Start Value" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none">
                    <input id="n3b" type="number" placeholder="End Value" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none">
                    <button onclick="calc3()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-medium hover:opacity-90 transition">Calculate</button>
                    <div id="res3" class="mt-3 p-3 bg-gray-100 rounded-lg text-center font-medium text-gray-800"></div>
                </div>

                <!-- 模块4：折扣计算 -->
                <div class="p-4 border border-gray-200 rounded-lg bg-gray-50">
                    <h2 class="text-lg font-semibold mb-3 text-gray-800">Discount Calculator</h2>
                    <input id="price" type="number" placeholder="Original Price" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none">
                    <input id="discount" type="number" placeholder="Discount %" class="w-full p-3 border border-gray-300 rounded-lg mb-3 input-focus focus:outline-none">
                    <button onclick="calcDiscount()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-medium hover:opacity-90 transition">Calculate</button>
                    <div id="resDiscount" class="mt-3 p-3 bg-gray-100 rounded-lg text-center font-medium text-gray-800"></div>
                </div>
            </div>
        </div>

        <footer class="text-center text-gray-500 text-sm py-4">
            <p>© 2025 Percentage Calculator. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // 功能1：X% of Y
        function calc1() {
            let p = parseFloat(document.getElementById('p1').value) || 0;
            let n = parseFloat(document.getElementById('n1').value) || 0;
            let r = (p / 100) * n;
            document.getElementById('res1').innerText = `Result: ${r.toFixed(2)}`;
        }

        // 功能2：X is what % of Y
        function calc2() {
            let x = parseFloat(document.getElementById('p2').value) || 0;
            let y = parseFloat(document.getElementById('n2').value) || 1;
            if (y === 0) {
                document.getElementById('res2').innerText = "Cannot divide by zero";
                return;
            }
            let r = (x / y) * 100;
            document.getElementById('res2').innerText = `Result: ${r.toFixed(2)}%`;
        }

        // 功能3：百分比增减
        function calc3() {
            let a = parseFloat(document.getElementById('n3a').value) || 0;
            let b = parseFloat(document.getElementById('n3b').value) || 0;
            if (a === 0) {
                document.getElementById('res3').innerText = "Cannot divide by zero";
                return;
            }
            let r = ((b - a) / a) * 100;
            let sign = r > 0 ? "Increase" : "Decrease";
            document.getElementById('res3').innerText = `${sign}: ${Math.abs(r).toFixed(2)}%`;
        }

        // 新增功能4：折扣计算
        function calcDiscount() {
            let price = parseFloat(document.getElementById('price').value) || 0;
            let disc = parseFloat(document.getElementById('discount').value) || 0;
            let saved = (price * disc) / 100;
            let finalPrice = price - saved;
            document.getElementById('resDiscount').innerText = `You save: ${saved.toFixed(2)} | Final Price: ${finalPrice.toFixed(2)}`;
        }
    </script>
</body>
</html>优化界面样式 + 新增折扣计算功能
